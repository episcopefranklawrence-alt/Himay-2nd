<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EDUGRAM — My Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="mp.css" />
</head>
<body>
  <div id="student-screen" class="screen active">
    
    <aside class="sidebar" id="student-sidebar">
      <div class="sidebar-brand">
        <svg width="28" height="28" viewBox="0 0 36 36" fill="none">
          <rect width="36" height="36" rx="10" fill="#1a3a5c"/>
          <path d="M8 26L18 10L28 26H8Z" fill="#c9a84c" opacity="0.9"/>
          <path d="M13 26L18 17L23 26H13Z" fill="white" opacity="0.9"/>
        </svg>
        <span>EDUGRAM</span>
      </div>
      <nav class="sidebar-nav">
        <a href="#" class="nav-item">
          <svg viewBox="0 0 20 20" fill="currentColor"><path d="M3 4a1 1 0 011-1h12a1 1 0 011 1v2a1 1 0 01-1 1H4a1 1 0 01-1-1V4zM3 10a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H4a1 1 0 01-1-1v-6zM14 9a1 1 0 00-1 1v6a1 1 0 001 1h2a1 1 0 001-1v-6a1 1 0 00-1-1h-2z"/></svg>
          Overview
        </a>
        <a href="#" class="nav-item">
          <svg viewBox="0 0 20 20" fill="currentColor"><path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z"/><path fill-rule="evenodd" d="M4 5a2 2 0 012-2 3 3 0 003 3h2a3 3 0 003-3 2 2 0 012 2v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 000 2h.01a1 1 0 100-2H7zm3 0a1 1 0 000 2h3a1 1 0 100-2h-3zm-3 4a1 1 0 100 2h.01a1 1 0 100-2H7zm3 0a1 1 0 100 2h3a1 1 0 100-2h-3z" clip-rule="evenodd"/></svg>
          Assignments
        </a>
        <a href="#" class="nav-item">
          <svg viewBox="0 0 20 20" fill="currentColor"><path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z"/></svg>
          Writing Editor
        </a>
        <a href="#" class="nav-item">
          <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z" clip-rule="evenodd"/></svg>
          Submission History
        </a>
        <a href="#" class="nav-item">
          <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M18 10c0 3.866-3.582 7-8 7a8.841 8.841 0 01-4.083-.98L2 17l1.338-3.123C2.493 12.767 2 11.434 2 10c0-3.866 3.582-7 8-7s8 3.134 8 7zM7 9H5v2h2V9zm8 0h-2v2h2V9zM9 9h2v2H9V9z" clip-rule="evenodd"/></svg>
          Feedback
        </a>
        <a href="#" class="nav-item active">
          <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/></svg>
          My Profile
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar">M</div>
          <div class="user-details">
            <span class="user-name">Maria Santos</span>
            <span class="user-role">Student</span>
          </div>
        </div>
        <button class="logout-btn">
          <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 3a1 1 0 00-1 1v12a1 1 0 102 0V4a1 1 0 00-1-1zm10.293 9.293a1 1 0 001.414 1.414l3-3a1 1 0 000-1.414l-3-3a1 1 0 10-1.414 1.414L14.586 9H7a1 1 0 100 2h7.586l-1.293 1.293z" clip-rule="evenodd"/></svg>
        </button>
      </div>
    </aside>

    <main class="main-content">
      <div class="topbar">
        <div class="topbar-left">
          <h1 class="topbar-title">My Profile</h1>
        </div>
        <div class="topbar-right">
          <div class="lang-badge">GB English</div>
          <div class="notification-btn">
            <svg viewBox="0 0 20 20" fill="currentColor"><path d="M10 2a6 6 0 00-6 6v3.586l-.707.707A1 1 0 004 14h12a1 1 0 00.707-1.707L16 11.586V8a6 6 0 00-6-6zM10 18a3 3 0 01-3-3h6a3 3 0 01-3 3z"/></svg>
            <span class="notif-dot"></span>
          </div>
        </div>
      </div>

      <div class="panel active" id="s-profile">
        <div class="panel-content">
          <div class="section-header"><h2>My Profile</h2></div>
          <div class="card create-form-card" style="max-width:560px;">
            
            <div class="teacher-profile-header">
              <div class="tp-avatar" id="sp-avatar-display">MS</div>
              <div class="tp-info">
                <div class="tp-fullname" id="sp-fullname-display">Maria Santos</div>
                <div class="tp-role-tag">Student</div>
                <div class="tp-email" id="sp-email-display">student@edugram.edu</div>
              </div>
            </div>
            
            <div style="padding:1.5rem;display:flex;flex-direction:column;gap:1rem;">
              <div class="field-row">
                <div class="field-group">
                  <label>First Name</label>
                  <input type="text" id="sp-first" value="Maria" />
                </div>
                <div class="field-group">
                  <label>Last Name</label>
                  <input type="text" id="sp-last" value="Santos" />
                </div>
              </div>
              <div class="field-group">
                <label>Email Address</label>
                <input type="email" id="sp-email-input" value="student@edugram.edu" disabled style="background:var(--gray-50);color:var(--gray-500);" />
              </div>
              <div class="field-group">
                <label>Student ID</label>
                <input type="text" id="sp-id-input" value="2024-00101" disabled style="background:var(--gray-50);color:var(--gray-500);" />
              </div>
              <div class="field-group">
                <label>New Password (leave blank to keep current)</label>
                <input type="password" id="sp-pass" placeholder="Min. 8 characters" />
              </div>
              
              <div class="sp-activity-card" id="sp-activity-card">
                <div class="spa-title">My Academic Activity</div>
                <div class="spa-stats">
                  <div class="spa-stat"><span id="spa-submitted">2</span><span>Submitted</span></div>
                  <div class="spa-stat"><span id="spa-graded">1</span><span>Graded</span></div>
                  <div class="spa-stat"><span id="spa-pending">1</span><span>Pending</span></div>
                </div>
              </div>
              
              <button class="btn-primary" id="sp-save-btn">Save Changes</button>
              <div id="sp-toast" class="form-success hidden" style="margin-top:0;">✓ Profile Updated!</div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
  
  <script src="mp.js"></script>
</body>
</html>
